<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>RAIN JOURNAL</title>
<link rel="stylesheet" href="style.css"/>
</head>
<body>
<canvas id="glCanvas"></canvas>

<div class="diary-wrapper">
  <div class="diary-card">

    <div class="drag-dots">
      <span></span><span></span><span></span>
      <span></span><span></span><span></span>
    </div>

    <div class="diary-header">
      <div class="diary-label-wrap">
        <span
          id="diaryTitle"
          class="diary-label"
          contenteditable="true"
          spellcheck="false"
          data-placeholder="NEW ENTRY"
        >NEW ENTRY</span>
      </div>
      <div class="diary-meta">
        <span class="diary-dot-pulse"></span>
        <span class="diary-date" id="diaryDate"></span>
      </div>
    </div>

    <div class="content-area" id="contentArea">
      <textarea id="diaryContent" class="diary-textarea"
        placeholder="Type something..." spellcheck="false"></textarea>
      <canvas id="drawCanvas" class="draw-canvas" style="display:none"></canvas>
    </div>

    <!-- 底部工具栏 -->
    <div class="diary-footer">

      <button class="tb-btn" id="btnPen" title="画笔模式">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/>
        </svg>
      </button>

      <button class="tb-btn" id="btnSound" title="雨声">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/>
          <path d="M15.54 8.46a5 5 0 0 1 0 7.07"/>
        </svg>
      </button>

      <div class="tb-sep"></div>

      <button class="tb-btn tb-danger" id="btnDelete" title="删除本条">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14H6L5 6"/>
          <path d="M10 11v6M14 11v6"/><path d="M9 6V4h6v2"/>
        </svg>
      </button>

      <button class="tb-btn" id="btnNew" title="新建条目">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
        </svg>
      </button>

      <div class="tb-sep"></div>

      <button class="tb-btn" id="btnPrev" title="前一天">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
      </button>

      <div class="entry-indicator" id="entryIndicator"></div>

      <button class="tb-btn" id="btnNext" title="后一天">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
          <polyline points="9 18 15 12 9 6"/>
        </svg>
      </button>

    </div>

    <div class="status-bar">
      <span class="diary-wc" id="diaryWc">0 字</span>
      <span class="save-status" id="saveStatus"></span>
    </div>

  </div>
</div>

<!-- 右上角悬浮图标组 -->
<div class="top-icons">
  <!-- 预览/全屏（装饰，类似截图里的眼睛图标） -->
  <button class="top-icon-btn" id="btnPreview" title="预览模式">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
      <circle cx="12" cy="12" r="3"/>
    </svg>
  </button>
  <!-- 效果控制（点击展开面板） -->
  <button class="top-icon-btn top-icon-active" id="btnConfig" title="效果控制">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <circle cx="12" cy="12" r="3"/>
      <path d="M19.07 4.93a10 10 0 0 1 0 14.14M4.93 4.93a10 10 0 0 0 0 14.14"/>
      <path d="M15.54 8.46a5 5 0 0 1 0 7.07M8.46 8.46a5 5 0 0 0 0 7.07"/>
    </svg>
  </button>
</div>

<!-- 效果控制面板（右上角图标展开，向左下方弹出） -->
<div class="ctrl-panel" id="ctrlPanel">
  <div class="panel-title">// RAIN CONFIG</div>
  <div class="ctrl-row">
    <label>RAIN</label>
    <input type="range" id="sliderRain" min="0" max="100" value="70"/>
    <span class="ctrl-val" id="valRain">70</span>
  </div>
  <div class="ctrl-row">
    <label>FOG</label>
    <input type="range" id="sliderFog" min="0" max="100" value="30"/>
    <span class="ctrl-val" id="valFog">30</span>
  </div>
  <div class="ctrl-row">
    <label>REFR</label>
    <input type="range" id="sliderRefr" min="0" max="100" value="60"/>
    <span class="ctrl-val" id="valRefr">60</span>
  </div>
  <div class="ctrl-row">
    <label>VOL</label>
    <input type="range" id="sliderVol" min="0" max="100" value="40"/>
    <span class="ctrl-val" id="valVol">40</span>
  </div>
  <div class="panel-sep"></div>
  <!-- 上传背景移入此处 -->
  <button class="panel-upload-btn" id="uploadBtn">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/>
    </svg>
    UPLOAD BG
  </button>
  <button class="panel-reset-btn" id="resetBtn">RESET BG</button>
</div>

<!-- 删除确认 -->
<div class="confirm-mask" id="confirmMask">
  <div class="confirm-box">
    <div class="confirm-title">DELETE ENTRY</div>
    <div class="confirm-desc" id="confirmDesc"></div>
    <div class="confirm-btns">
      <button id="confirmCancel">CANCEL</button>
      <button id="confirmOk" class="danger">DELETE</button>
    </div>
  </div>
</div>

<!-- 画笔浮层 -->
<div class="pen-toolbar" id="penToolbar">
  <input type="color" id="penColor" value="#ffffff" title="颜色"/>
  <input type="range" id="penSize" min="1" max="20" value="4" title="粗细"/>
  <button id="penErase" class="erase-btn" title="橡皮">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6">
      <path d="M20 20H7L3 16l10-10 7 7-2.5 2.5"/>
      <path d="M6.5 17.5l5-5"/>
    </svg>
  </button>
  <button id="penClear" class="erase-btn" title="清除">CLR</button>
</div>

<input type="file" id="mediaInput" accept="image/*,video/*" style="display:none"/>
<div class="toast" id="toast"></div>

<script src="shader.js"></script>
<script src="main.js"></script>
</body>
</html>
