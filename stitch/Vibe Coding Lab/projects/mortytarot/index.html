<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Think: What Would Morty Do?</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <!-- Stars Background Animation -->
  <div id="stars-container" class="stars-container"></div>

  <!-- Start Screen -->
  <div id="start-screen" class="start-screen">
    <div class="portal-container">
      <img src="https://static.wefun.ai/assets/f885f1d4-7c8a-4939-9278-070dd29fc420.png" alt="Portal" class="portal-img">
    </div>
    <h2 class="start-title">Think: What Would Morty Do?</h2>
    <button id="start-btn" class="btn start-action-btn">I'm ready to accept Morty's advice</button>
  </div>

  <div class="game-container">
    
    <h1 class="main-title">Think: What Would Morty Do?</h1>
    <p class="subtitle">A Daily Draw for the Anxious Soul</p>
    
    <!-- Sound Control -->
    <div class="sound-control">
      <button id="sound-toggle-btn" class="sound-btn" aria-label="Toggle Sound">🔊</button>
    </div>

    <!-- The Card Selection Area (The Spread) -->
    <div id="deck-spread" class="deck-spread">
      <!-- Cards will be generated by JS here -->
    </div>
    <div id="instruction-text" class="instruction">Pick a card... any card.</div>

    <!-- The Reveal Scene (Initially Hidden) -->
    <div class="scene" id="main-scene" style="display: none;">
      <div class="card" id="tarot-card">
        
        <!-- Front Face (Revealed) -->
        <div class="card-face front">
          
          <!-- State 1: Loading (Icon Only) -->
          <div id="loading-state" class="loading-state">
            <img src="https://static.wefun.ai/assets/ba8b81ec-9b54-4ec1-9a81-b7354bb83d67.png" alt="Loading..." class="loading-icon">
            <p class="loading-text">Morty is thinking...</p>
          </div>

          <!-- State 2: Content (Hidden until loaded) -->
          <div id="content-state" class="content-state" style="display: none;">
            <div class="card-header">
              <div class="card-number" id="card-number"></div>
              <div class="card-title" id="card-name">The Fool</div>
            </div>
            
            <div class="card-image-container">
              <img id="card-img" class="card-image" src="" alt="Tarot Card Illustration">
            </div>
            
            <div class="maxim-container">
              <div class="maxim-label">Daily Maxim</div>
              <div class="card-advice" id="card-advice">Just go for it, geez.</div>
            </div>
          </div>

        </div>

        <!-- Back Face (Deck) -->
        <div class="card-face back">
          <!-- Image handled via CSS background -->
        </div>

      </div>
    </div>

    <div class="controls">
      <div id="status-msg" class="message"></div>
      <div class="action-buttons">
        <button id="download-btn" class="btn secondary" style="display: none;">Save Card ⬇️</button>
        <button id="restart-btn" class="btn secondary" style="display: none;">Draw Again</button>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
